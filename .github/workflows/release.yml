name: Release

# 触发条件：推送 v* 格式的 tag（如 v1.0.1、v1.2.0）
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 缓存 Gradle，加速后续构建
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 4. 从 tag 名解析版本号（去掉 v 前缀），生成 versionCode
      #    tag v1.2.3  →  VERSION_NAME=1.2.3，VERSION_CODE 由 GitHub run_number 自动递增
      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.2.3
          NAME="${TAG#v}"                   # e.g. 1.2.3
          # versionCode: MAJOR*10000 + MINOR*100 + PATCH，确保单调递增
          IFS='.' read -r MAJOR MINOR PATCH <<< "$NAME"
          CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "VERSION_NAME=$NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$CODE" >> "$GITHUB_ENV"
          echo "TAG=$TAG"   >> "$GITHUB_OUTPUT"
          echo "NAME=$NAME" >> "$GITHUB_OUTPUT"

      # 5. 将 Keystore Base64 还原为文件（存储在 GitHub Secrets 中）
      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/mushroom-release.jks

      # 6. 赋予 gradlew 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 7. 构建 release APK（签名凭证通过环境变量传入，不落盘）
      - name: Build release APK
        env:
          RELEASE_STORE_FILE: mushroom-release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      # 8. 重命名 APK，加上版本号
      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/mushroom-adventure-${{ steps.version.outputs.NAME }}.apk

      # 9. 在 GitHub 上创建 Release，并上传 APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "蘑菇大冒险 ${{ steps.version.outputs.TAG }}"
          draft: false
          prerelease: false
          generate_release_notes: true        # 自动从 commit 生成更新日志
          files: app/build/outputs/apk/release/mushroom-adventure-${{ steps.version.outputs.NAME }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
