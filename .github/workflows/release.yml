name: Release

# 触发条件：推送 v* 或 uk-v* 格式的 tag
# v1.8.0 → 蘑菇大冒险, uk-v1.0.0 → 逐梦英伦
on:
  push:
    tags:
      - 'v*'
      - 'uk-v*'

permissions:
  contents: write
  issues: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Determine flavor and version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == uk-v* ]]; then
            FLAVOR="ukdream"
            NAME="${TAG#uk-v}"
            APP_LABEL="逐梦英伦"
            APK_PREFIX="ukdream-adventure"
          else
            FLAVOR="mushroom"
            NAME="${TAG#v}"
            APP_LABEL="蘑菇大冒险"
            APK_PREFIX="mushroom-adventure"
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$NAME"
          CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "VERSION_NAME=$NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$CODE" >> "$GITHUB_ENV"
          echo "TAG=$TAG"             >> "$GITHUB_OUTPUT"
          echo "NAME=$NAME"           >> "$GITHUB_OUTPUT"
          echo "FLAVOR=$FLAVOR"       >> "$GITHUB_OUTPUT"
          echo "APP_LABEL=$APP_LABEL" >> "$GITHUB_OUTPUT"
          echo "APK_PREFIX=$APK_PREFIX" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/mushroom-release.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        env:
          RELEASE_STORE_FILE: mushroom-release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          FLAVOR="${{ steps.version.outputs.FLAVOR }}"
          CAPITALIZED="$(echo "${FLAVOR:0:1}" | tr '[:lower:]' '[:upper:]')${FLAVOR:1}"
          ./gradlew ":app:assemble${CAPITALIZED}Release" --no-daemon

      - name: Rename APK
        run: |
          FLAVOR="${{ steps.version.outputs.FLAVOR }}"
          APK_PREFIX="${{ steps.version.outputs.APK_PREFIX }}"
          NAME="${{ steps.version.outputs.NAME }}"
          mv "app/build/outputs/apk/${FLAVOR}/release/app-${FLAVOR}-release.apk" \
             "app/build/outputs/apk/${FLAVOR}/release/${APK_PREFIX}-${NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "${{ steps.version.outputs.APP_LABEL }} ${{ steps.version.outputs.TAG }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: app/build/outputs/apk/${{ steps.version.outputs.FLAVOR }}/release/${{ steps.version.outputs.APK_PREFIX }}-${{ steps.version.outputs.NAME }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify open bug issues of new release
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = '${{ steps.version.outputs.TAG }}';
            const appLabel = '${{ steps.version.outputs.APP_LABEL }}';

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag,
            });

            const body = release.body || '';
            const issueNums = [...body.matchAll(/refs\s+#(\d+)/gi)].map(m => parseInt(m[1]));
            const unique = [...new Set(issueNums)];

            for (const num of unique) {
              let issue;
              try {
                ({ data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                }));
              } catch (e) { continue; }

              if (issue.state !== 'open') continue;

              const labels = issue.labels.map(l => l.name);
              if (!labels.includes('bug')) continue;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                body: [
                  `🚀 **${tag} 已发布，等待回归验收**`,
                  '',
                  `修复已包含在 [${appLabel} ${tag}](${release.html_url}) 中。`,
                  '',
                  '**回归步骤**：',
                  '1. 从 Release 页面下载并安装 APK',
                  '2. 执行 `BugIssueTestCase.md` 中对应的验收用例',
                  '3. 验证通过后，**在此 Issue 页面点击「Close issue」关闭**',
                  '4. 通知 Claude Code：`#' + num + ' 回归通过`',
                ].join('\n')
              });
            }
