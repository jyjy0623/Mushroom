name: Regression Notification

# 触发条件：Issue 被关闭时
on:
  issues:
    types: [closed]

# 只需要写 Issues 的权限
permissions:
  issues: write

jobs:
  notify-regression:
    runs-on: ubuntu-latest

    # 只处理带有 bug label 的 Issue
    if: contains(toJson(github.event.issue.labels.*.name), 'bug')

    steps:
      # 在 Issue 上追加评论，提醒更新测试报告
      - name: Comment on closed bug issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueTitle = issue.title;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '✅ **Issue 已关闭 — 回归验收确认**',
                '',
                `Issue **#${issueNumber}** 已关闭。`,
                '',
                '**下一步**：请告知 Claude Code：',
                '```',
                `#${issueNumber} 回归通过`,
                '```',
                'Claude Code 将自动执行：',
                '1. 在 `BugIssueTestCase.md` 对应 TC 处打勾并注明版本号',
                '2. 更新 `tc-*.md` 原始用例为 `[x] 通过`',
                '3. 提交 commit：`docs: #' + issueNumber + ' 回归验收通过，更新 tc-*.md`',
              ].join('\n')
            });
